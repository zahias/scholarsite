name: Deploy to A2

on:
  push:
    branches:
      - main

concurrency:
  group: a2-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.A2_HOST }}
          username: ${{ secrets.A2_USER }}
          key: ${{ secrets.A2_KEY }}
          port: 7822
          request_pty: false
          script: |
            set -e
            echo "🚀 Connecting to A2..."
            cd ${{ secrets.A2_PATH }}
            
            echo "📥 Fetching latest code..."
            # Shared-hosting NPROC limits count threads. Git defaults its
            # thread counts to the server's core count, so a plain fetch can
            # spawn dozens of threads at once. Pin everything to 1 and
            # disable auto-gc (repack is the worst offender).
            git config pack.threads 1
            git config index.threads 1
            git config checkout.workers 1
            git config fetch.parallel 1
            git config submodule.fetchJobs 1
            git config gc.auto 0
            git config gc.autoDetach false
            git fetch --depth 1 origin main
            git reset --hard origin/main
            git clean -fd
            
            echo "📋 Syncing production files..."
            echo "🧼 Removing stale runtime artifacts..."
            rm -rf /home/bannwebs/scholarsite/dist
            rm -rf /home/bannwebs/scholarsite/__MACOSX
            rm -f /home/bannwebs/scholarsite/server.js
            rm -f /home/bannwebs/scholarsite/index.js.bak
            rm -f /home/bannwebs/scholarsite/package-lock.json.bak.*
            rm -rf /home/bannwebs/scholarsite/node_modules.bak.*
            cp -rf production/* /home/bannwebs/scholarsite/
            rm -rf /home/bannwebs/scholarsite/public/assets/*
            cp -rf production/public/assets/* /home/bannwebs/scholarsite/public/assets/
            
            echo "🧹 Cleaning up and restarting..."
            mkdir -p /home/bannwebs/scholarsite/tmp
            mkdir -p /home/bannwebs/scholarsite/uploads
            chmod 755 /home/bannwebs/scholarsite/uploads
            touch /home/bannwebs/scholarsite/tmp/restart.txt
            echo "✅ Deployment successful!"
