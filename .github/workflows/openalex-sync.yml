name: Monthly OpenAlex Eligibility Check

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: openalex-sync-production
  cancel-in-progress: false

permissions: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Run due OpenAlex synchronizations
        env:
          SYNC_JOB_TOKEN: ${{ secrets.SYNC_JOB_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$SYNC_JOB_TOKEN"
          curl --fail-with-body --silent --show-error \
            --retry 2 \
            --retry-delay 30 \
            --max-time 900 \
            -X POST \
            -H "Authorization: Bearer $SYNC_JOB_TOKEN" \
            -H "Content-Type: application/json" \
            https://scholar.name/api/internal/jobs/openalex-sync
